name: Build APK — JetinoPay Release (PAX Store)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Versão do app (ex: 1.0.1)'
        required: false
        default: '1.0.0'

jobs:
  build:
    name: Compilar APK Release Assinado
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Decodificar Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > $RUNNER_TEMP/jetinopay-release.jks
          echo "Keystore decodificado: $(du -h $RUNNER_TEMP/jetinopay-release.jks | cut -f1)"

      - name: Permissão gradlew
        run: chmod +x gradlew

      - name: Compilar APK Release Assinado
        run: ./gradlew assembleRelease --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          KEYSTORE_PATH: ${{ runner.temp }}/jetinopay-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Verificar assinatura APK
        run: |
          APK=app/build/outputs/apk/release/app-release.apk
          echo "APK: $(du -h $APK | cut -f1)"
          $ANDROID_SDK_ROOT/build-tools/$(ls $ANDROID_SDK_ROOT/build-tools/ | tail -1)/apksigner verify --verbose $APK 2>&1 | head -5

      - name: Upload APK Release
        uses: actions/upload-artifact@v4
        with:
          name: JetinoPay-Release-PAXStore
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      - name: Resumo do build
        run: |
          APK=app/build/outputs/apk/release/app-release.apk
          echo "### APK Release Gerado" >> $GITHUB_STEP_SUMMARY
          echo "- **Arquivo:** app-release.apk" >> $GITHUB_STEP_SUMMARY
          echo "- **Tamanho:** $(du -h $APK | cut -f1)" >> $GITHUB_STEP_SUMMARY
          echo "- **Pronto para:** PAX Store / PAXSTORE" >> $GITHUB_STEP_SUMMARY
